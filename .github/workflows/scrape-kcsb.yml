name: KCSB Data Scraper

on:
  # Run quarterly on the 1st of January, April, July, and October at 2 AM UTC
  schedule:
    - cron: '0 2 1 1,4,7,10 *'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  scrape-general-statistics:
    name: الاحصاءات العامة
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run scraper for الاحصاءات العامة
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_BUCKET_NAME: ${{ secrets.AWS_BUCKET_NAME }}
        run: |
          python scraper.py --category "الاحصاءات العامة"
      
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-general-statistics
          path: |
            *.log
          retention-days: 7

